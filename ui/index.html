<!DOCTYPE html>
<html lang="en" class="scheme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smooth 2D3D</title>
  <link href="./tailwind.min.css" rel="stylesheet">
  <style>
    body {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #app {
      position: relative;
      margin: 0;
      overflow: auto;
    }
  </style>
</head>
<body class="bg-slate-900 text-white">
  <div id="app" x-data="app" class="p-3">
    <div class="container max-w-md mx-auto">
      <form class="flex flex-col" @submit.prevent="runSmooth">
        <label class="flex flex-col mt-2">
          <span>DICOM Input</span>
          <input type="text" x-model="selectionName" readonly id="dropzone" :class="dragHover ? 'bg-slate-700' : 'bg-slate-800'" class="border-slate-500 rounded mt-1" placeholder="Drop instance or .dcm file here…" />
        </label>
        <label class="flex flex-col mt-4">
          <span>Sigma</span>
          <input type="number" x-model.number="sigma" class="bg-slate-800 border-slate-500 rounded mt-1" placeholder="0.3" step="0.1" />
        </label>
        <label class="flex flex-col mt-4">
          <span>Output Folder</span>
          <input type="text" x-model="outputDir" readonly class="bg-slate-800 border-slate-500 rounded mt-1" :title="outputDir" @click="selectOutputDir()" />
        </label>
        <button type="submit" class="inline-flex justify-center items-center text-center bg-sky-600 px-3 py-2 mt-4 rounded hover:cursor-pointer disabled:cursor-not-allowed disabled:bg-sky-300/30 disabled:text-gray-300" :disabled="!selection || selectionType === '3D' || !outputDir || processing">
          <template x-if="processing">
            <svg class="mr-3 -ml-1 size-5 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          </template>
          <span x-text="processing ? 'Processing…' : `Smooth${selectionType}${selectionType === '3D' ? ' (WIP)' : ''}`"></span>
        </button>
      </form>
      <br />
      <template x-if="output">
        <p>
          Output:<br />
          <a href="#" :title="output.filePath" @click.prevent="openWithVolView(output.filePath, output.fileName)" class="text-blue-500 hover:text-blue-400 hover:underline">
            <code x-text="output.fileName"></code>
          </a>
          <span class="text-sm text-gray-400 hover:text-white hover:cursor-pointer ml-2" @click.prevent.stop="showInFolder(output.filePath)">Show in Folder</span>
        </p>
      </template>
      <template x-if="output">
        <label class="flex items-center">
          <input id="roiMask1" type="text" x-model="roiMask1" readonly style="width: 400px" class="bg-slate-800 border-slate-500 rounded mt-1" :title="roiMask1" placeholder="Manual ROI" @click.prevent.stop="roiMask1 ? showInFolder(roiMask1) : openWithVolView(output.filePath, output.fileName, { manualType: 'segmentation', manualInputId: '#roiMask1' })" />
          <svg x-show="roiMask1" @click.prevent.stop="roiMask1 = null" class="size-6 ml-2 opacity-60 hover:opacity-100 hover:cursor-pointer" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
            <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
          </svg>
        </label>
      </template>
      <template x-if="output">
        <iframe
          id="vIframe"
          src="about:blank"
          frameborder="0"
          width="400"
          height="300"
          class="mt-1 hidden"
        ></iframe>
      </template>
    </div>
  </div>

  <script src="./alpinejs@3.15.8/dist/cdn.min.js" defer></script>
  <script>
    const app = document.getElementById('app');
    let data = null;

    document.addEventListener('alpine:init', () => {
      Alpine.data('app', () => {
        return {
          _selection: null,
          _selectionPayload: null,
          get selection() {
            return this._selection;
          },
          get selectionPayload() {
            return this._selectionPayload;
          },
          get selectionName() {
            return this._selection?.name ?? '';
          },
          get selectionType() {
            return {
              'series': '3D',
              'instance': '2D',
            }[this._selection?.slot] ?? (this._selection?.isFile ? '2D' : '');
          },
          set selection(val) {
            this._selection = val;
            if (!val) {
              this._selectionPayload = null;
            }
            if (this.output) {
              this.output = null;
            }
          },
          set selectionPayload(val) {
            this._selectionPayload = val;
            if (this.output) {
              this.output = null;
            }
          },
          dragHover: false,
          dragTimeout: null,

          // ...
          processing: false,
          sigma: 0.3,
          outputDir: '',
          output: null,

          roiMask1: null,

          async runSmooth() {
            if (this.processing) return;
            this.processing = true;

            this.output = null;
            try {
              const res = await $electron?.api(
                '@pmt/smooth/smooth',
                JSON.parse(JSON.stringify(this.selectionPayload ?? this.selection)),
                parseFloat(this.sigma),
                this.outputDir,
              );
              if (res) {
                if (typeof res === 'string') {
                  showInFolder(res);
                } else if (res.path) {
                  this.output = { filePath: res.path, fileName: res.name };
                  const volviewURL = await openWithVolView(this.output.filePath, this.output.fileName, { newWindow: false });
                  if (volviewURL) {
                    const vIframe = document.getElementById('vIframe');
                    if (vIframe) {
                      vIframe.src = volviewURL;
                      setTimeout(() => {
                        vIframe.classList.remove('hidden');
                      }, 1000);
                    }
                  }
                }
              }
              console.log('output:', res);
            } catch (err) {
              console.error(err);
            } finally {
              this.processing = false;
            }
          },
        };
      });
      setTimeout(() => {
        data = app._x_dataStack[0];
      }, 100);
    });

    window.__debugExportModuleApi = async function () {
      try {
        const snapshot = await $electron?.api('@pmt/smooth/__debug_export_module_api__');
        console.log('[export module api debug]', snapshot);
        return snapshot;
      } catch (err) {
        console.error('[export module api debug] failed', err);
        throw err;
      }
    };

    window.addEventListener('DOMContentLoaded', () => $electron?.onLoaded());
    window.addEventListener('message', async (e) => {
      if (e.source !== window) {
        return;
      }
      // handle manual roi mask saved from volview
      if (e.data?.type === 'volview:created-segmentation') {
        if (e.data.payload?.manualInputId) {
          const { manualInputId, createdAt, ...data } = e.data.payload;
          saveManualSegmentation(manualInputId, data);
        }
        return;
      }
      if (e.data?.type === 'load-args') {
        const payload = normalizeInputPayload(e.data.args?.[0] ?? null);
        if (payload) {
          setTimeout(() => {
            data.selectionPayload = payload;
            data.selection = payload.selection;
          }, 200);
        }
      }
    });
    const dropzone = document.getElementById('dropzone');
    dropzone.addEventListener('dragover', function (e) {
      e.preventDefault();
      data.dragHover = true;
      if (data.dragTimeout !== null) {
        clearTimeout(data.dragTimeout);
        data.dragTimeout = null;
      }
    });
    dropzone.addEventListener('dragleave', function (e) {
      data.dragTimeout = setTimeout(() => {
        data.dragHover = false;
        data.dragTimeout = null;
      }, 50);
    });
    dropzone.addEventListener('drop', function (e) {
      e.preventDefault();
      data.dragHover = false;
      // Tell Electron this window received the drop so it stays on top & focused
      $electron?.notifyDrop?.();
      try {
        const payload = normalizeInputPayload(JSON.parse(e.dataTransfer.getData('text') || 'null'));
        console.log('drop:', payload);
        if (payload?.selection) {
          data.selectionPayload = payload;
          data.selection = payload.selection;
        } else {
          data.selectionPayload = null;
          data.selection = null;
        }
      } catch (err) {}
    });

    function isDicomFileSelection(selection) {
      if (!(selection?.isFile === true)) {
        return false;
      }
      const type = typeof selection?.type === 'string' ? selection.type.toLowerCase() : '';
      const name = typeof selection?.name === 'string' ? selection.name.toLowerCase() : '';
      return type === '.dcm' || name.endsWith('.dcm');
    }

    function normalizeInputPayload(payload) {
      if (!payload || typeof payload !== 'object') {
        return null;
      }

      if (payload?.from === 'patient' && payload.selection?.slot === 'instance') {
        const filePath = payload.selection.filePath || payload.selection.path;
        const name = payload.selection.fileName || payload.selection.name;
        if (!(filePath && name)) {
          return null;
        }
        return {
          from: 'module',
          selection: {
            name,
            path: filePath,
            isFile: true,
            type: '.dcm',
          },
        };
      }

      if (payload?.from === 'root' && isDicomFileSelection(payload.selection)) {
        return {
          from: 'root',
          selection: {
            name: payload.selection.name,
            path: payload.selection.path,
            isFile: true,
            type: payload.selection.type || '.dcm',
          },
        };
      }

      return null;
    }

    async function selectOutputDir() {
      const { canceled, filePaths: fullPaths } = await $electron.showOpenDialog({
        properties: ['openDirectory'],
      });
      if (!canceled && fullPaths[0]) {
        data.outputDir = fullPaths[0];
      } else {
        data.outputDir = '';
      }
    }

    function showInFolder(path) {
      $electron?.showInFolder(path);
    }

    async function saveManualSegmentation(manualInputId, data) {
      if ('$electron' in window && manualInputId) {
        const {
          fileContent,
          fileName,
          fileType,
          fileMime,
        } = data;
        const {
          filePath,
          canceled,
        } = await $electron?.showSaveDialog({
          defaultPath: fileName,
          filters: [{ name: 'Custom File Type', extensions: [fileType] }],
        });
        if (!filePath || canceled) {
          return;
        }
        const file = await $electron?.saveFile(filePath, fileContent);
        if (!file) {
          return;
        }
        const inputEl = document.getElementById(manualInputId.replace('#', ''));
        if (inputEl) {
          inputEl.value = file;
          // ensure alpinejs detects the change
          inputEl.dispatchEvent(new Event('input', { bubbles: true }));
        }
      }
    }

    async function openWithVolView(filePath, fileName, options = {
      newWindow: true,
      // manualInputId: '#anchor',
      // manualType: 'segmentation',
      // labelmapFormat: 'dcm',
    }) {
      return $electron.openWithVolView(filePath, fileName, options);
    }
  </script>
</body>
</html>
